<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>치지직 룰렛</title>
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap" rel="stylesheet"/>
  <style>
    @font-face {
      font-family: 'Pretendard';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Thin.woff2') format('woff2');
      font-weight: 100; font-display: swap;
    }
    @font-face {
      font-family: 'Pretendard';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-ExtraLight.woff2') format('woff2');
      font-weight: 200; font-display: swap;
    }
    @font-face {
      font-family: 'Pretendard';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Light.woff2') format('woff2');
      font-weight: 300; font-display: swap;
    }
    @font-face {
      font-family: 'Pretendard';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Regular.woff2') format('woff2');
      font-weight: 400; font-display: swap;
    }
    @font-face {
      font-family: 'Pretendard';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Medium.woff2') format('woff2');
      font-weight: 500; font-display: swap;
    }
    @font-face {
      font-family: 'Pretendard';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-SemiBold.woff2') format('woff2');
      font-weight: 600; font-display: swap;
    }
    @font-face {
      font-family: 'Pretendard';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Bold.woff2') format('woff2');
      font-weight: 700; font-display: swap;
    }
    @font-face {
      font-family: 'Pretendard';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-ExtraBold.woff2') format('woff2');
      font-weight: 800; font-display: swap;
    }
    @font-face {
      font-family: 'Pretendard';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Black.woff2') format('woff2');
      font-weight: 900; font-display: swap;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #000000;
      --surf1:        #0a0a0a;
      --surf2:        #111111;
      --surf3:        #1a1a1a;
      --border:       rgba(255,255,255,0.06);
      --border2:      rgba(255,255,255,0.1);
      --accent:       #00FFA3;
      --accent-dim:   rgba(0,255,163,0.1);
      --accent-glow:  rgba(0,255,163,0.2);
      --accent-border:rgba(0,255,163,0.25);
      --text:         #f0f0f0;
      --muted:        #444455;
      --muted2:       #666677;
      --danger:       #ff4d4d;
      --gold:         #ffcc00;
    }

    body {
      font-family: 'Pretendard', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* 그리드 배경 */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,163,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,163,0.02) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── 헤더 ────────────────────────────── */
    header {
      height: 52px;
      min-height: 52px;
      display: flex;
      align-items: center;
      padding: 0 18px;
      gap: 14px;
      background: var(--surf1);
      border-bottom: 1px solid var(--border);
      position: relative;
      z-index: 10;
    }
    header::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.3;
    }

    .brand {
      font-family: 'Black Han Sans', sans-serif;
      font-size: 1.05rem;
      color: var(--accent);
      letter-spacing: 1px;
    }

    .channel-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--accent-dim);
      border: 1px solid var(--accent-border);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.76rem;
      color: var(--accent);
    }

    .back-btn {
      margin-left: auto;
      height: 28px;
      padding: 0 12px;
      background: transparent;
      border: 1px solid var(--border2);
      border-radius: 6px;
      color: var(--muted2);
      font-size: 0.72rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .back-btn:hover { border-color: var(--accent-border); color: var(--accent); }

    /* ── 레이아웃 ────────────────────────── */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 255px 1fr 275px;
      overflow: hidden;
      position: relative;
      z-index: 1;
    }

    .panel {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      overflow: hidden;
    }
    .panel:last-child { border-right: none; }

    .panel-header {
      height: 38px;
      min-height: 38px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      border-bottom: 1px solid var(--border);
      background: var(--surf1);
    }
    .panel-title {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--muted2);
    }

    .panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .panel-body::-webkit-scrollbar { width: 3px; }
    .panel-body::-webkit-scrollbar-thumb { background: var(--surf3); border-radius: 2px; }

    /* ── 설정 그룹 ───────────────────────── */
    .sg {
      background: var(--surf2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 13px;
    }
    .sg-title {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px;
      opacity: 0.7;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 10px;
    }
    .row:last-child { margin-bottom: 0; }

    .row-label { font-size: 0.78rem; color: var(--text); }
    .row-sub   { font-size: 0.66rem; color: var(--muted2); margin-top: 2px; }

    .num-input {
      width: 76px;
      height: 30px;
      background: var(--surf3);
      border: 1px solid var(--border2);
      border-radius: 7px;
      color: var(--text);
      font-size: 0.8rem;
      text-align: center;
      outline: none;
      transition: border-color 0.2s;
    }
    .num-input:focus { border-color: var(--accent); }

    /* 토글 */
    .toggle {
      width: 38px; height: 20px;
      background: var(--surf3);
      border-radius: 10px;
      cursor: pointer;
      position: relative;
      transition: background 0.2s;
      border: 1px solid var(--border2);
      flex-shrink: 0;
    }
    .toggle::after {
      content: '';
      position: absolute;
      width: 14px; height: 14px;
      background: var(--muted2);
      border-radius: 50%;
      top: 2px; left: 2px;
      transition: all 0.2s;
    }
    .toggle.on { background: var(--accent-dim); border-color: var(--accent-border); }
    .toggle.on::after { background: var(--accent); left: 20px; }

    /* 슬롯 목록 */
    .slot-item {
      display: flex;
      align-items: center;
      gap: 7px;
      background: var(--surf3);
      border: 1px solid transparent;
      border-radius: 7px;
      padding: 7px 9px;
      margin-bottom: 5px;
      transition: border-color 0.2s;
    }
    .slot-item:last-child { margin-bottom: 0; }
    .slot-item:hover { border-color: var(--border2); }

    .slot-color { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }

    .slot-name-input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text);
      font-family: 'Pretendard', sans-serif;
      font-size: 0.78rem;
      outline: none;
      min-width: 0;
    }

    .slot-count {
      font-size: 0.7rem;
      color: var(--accent);
      font-weight: 700;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .slot-del {
      background: none; border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.75rem;
      padding: 2px 3px;
      border-radius: 3px;
      transition: color 0.15s;
      flex-shrink: 0;
    }
    .slot-del:hover { color: var(--danger); }

    .add-row {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }
    .add-input {
      flex: 1;
      height: 32px;
      padding: 0 10px;
      background: var(--surf3);
      border: 1px solid var(--border2);
      border-radius: 7px;
      color: var(--text);
      font-family: 'Pretendard', sans-serif;
      font-size: 0.78rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .add-input:focus { border-color: var(--accent); }

    .btn-add {
      height: 32px;
      padding: 0 11px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 7px;
      font-weight: 700;
      font-size: 0.75rem;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    .btn-add:hover { opacity: 0.85; }

    .btn-outline {
      width: 100%;
      height: 34px;
      background: transparent;
      border: 1px solid var(--border2);
      border-radius: 8px;
      color: var(--muted2);
      font-size: 0.76rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-outline:hover { border-color: var(--danger); color: var(--danger); }

    /* ── 룰렛 중앙 ───────────────────────── */
    .roulette-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 16px;
      overflow: hidden;
    }

    .roulette-wrap {
      position: relative;
      width: min(360px, calc(100vh - 230px));
      height: min(360px, calc(100vh - 230px));
      flex-shrink: 0;
    }

    /* 외곽 링 */
    .roulette-ring {
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 2px solid var(--accent-border);
      box-shadow: 0 0 30px var(--accent-glow), inset 0 0 30px rgba(0,0,0,0.5);
      pointer-events: none;
    }

    /* 포인터 */
    .roulette-pointer {
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      width: 0; height: 0;
      border-left: 11px solid transparent;
      border-right: 11px solid transparent;
      border-top: 26px solid var(--accent);
      filter: drop-shadow(0 0 6px var(--accent));
    }

    #rouletteCanvas {
      width: 100%;
      height: 100%;
      border-radius: 50%;
    }

    .spin-btn {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 64px; height: 64px;
      border-radius: 50%;
      background: var(--bg);
      border: 2px solid var(--accent);
      color: var(--accent);
      font-family: 'Black Han Sans', sans-serif;
      font-size: 0.78rem;
      letter-spacing: 1px;
      cursor: pointer;
      z-index: 10;
      transition: all 0.2s;
      box-shadow: 0 0 16px var(--accent-glow);
    }
    .spin-btn:hover {
      background: var(--accent);
      color: #000;
      box-shadow: 0 0 28px var(--accent-glow);
    }
    .spin-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* 결과 */
    .result-box {
      min-height: 52px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
    }
    .result-label {
      font-size: 0.62rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted2);
    }
    .result-name {
      font-family: 'Black Han Sans', sans-serif;
      font-size: 1.6rem;
      color: var(--accent);
      text-shadow: 0 0 20px var(--accent-glow);
      animation: pop 0.4s ease;
    }
    @keyframes pop {
      from { transform: scale(0.6); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    .ctrl-row {
      display: flex;
      gap: 8px;
    }
    .btn-ctrl {
      height: 34px;
      padding: 0 14px;
      border-radius: 8px;
      font-size: 0.76rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      border: 1px solid var(--border2);
      background: var(--surf2);
      color: var(--text);
    }
    .btn-ctrl:hover { border-color: var(--accent-border); color: var(--accent); }
    .btn-ctrl.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #000;
    }
    .btn-ctrl.primary:hover { opacity: 0.85; }
    .btn-ctrl:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ── 채팅 ────────────────────────────── */
    .chat-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .chat-list::-webkit-scrollbar { width: 3px; }
    .chat-list::-webkit-scrollbar-thumb { background: var(--surf3); }

    .chat-item {
      font-size: 0.79rem;
      line-height: 1.55;
      word-break: break-word;
      padding: 1px 0;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .chat-user { font-weight: 700; color: #60c8ff; margin-right: 5px; }
    .chat-msg  { color: #ccc; }

    .donation-chat {
      background: rgba(0,255,163,0.05);
      border-left: 2px solid var(--accent);
      border-radius: 6px;
      padding: 6px 9px;
      margin: 3px 0;
    }
    .donation-chat .chat-user { color: var(--accent); }
    .donation-slots {
      font-size: 0.68rem;
      color: var(--accent);
      font-weight: 700;
      opacity: 0.8;
    }
    .donation-msg-text { font-size: 0.76rem; color: #999; margin-top: 2px; }

    .system-chat {
      font-size: 0.68rem;
      color: var(--muted2);
      text-align: center;
      font-style: italic;
      padding: 3px 0;
    }

    .conn-status {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.66rem;
      color: var(--muted2);
    }
    .conn-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); }
    .conn-dot.on  { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
    .conn-dot.err { background: var(--danger); }

    .empty-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--muted2);
      font-size: 0.78rem;
      text-align: center;
    }

    /* ── 당첨 오버레이 ───────────────────── */
    .winner-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 100;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }
    .winner-overlay.show { display: flex; animation: fadeIn 0.3s ease; }

    .winner-emoji { font-size: 5rem; animation: bounce 0.7s ease infinite alternate; }
    @keyframes bounce { from { transform: scale(1) rotate(-5deg); } to { transform: scale(1.1) rotate(5deg); } }

    .winner-label {
      font-size: 0.72rem;
      letter-spacing: 5px;
      color: var(--muted2);
      text-transform: uppercase;
    }
    .winner-name {
      font-family: 'Black Han Sans', sans-serif;
      font-size: clamp(2.2rem, 8vw, 4.5rem);
      color: var(--accent);
      text-shadow: 0 0 40px var(--accent-glow);
      text-align: center;
      padding: 0 24px;
    }

    /* 파티클 링 */
    .winner-ring {
      position: absolute;
      width: 300px; height: 300px;
      border-radius: 50%;
      border: 1px solid var(--accent-border);
      animation: ringPulse 1.5s ease-in-out infinite;
    }
    @keyframes ringPulse {
      0%   { transform: scale(0.8); opacity: 0.5; }
      100% { transform: scale(1.5); opacity: 0; }
    }

    .btn-close {
      margin-top: 8px;
      height: 42px;
      padding: 0 28px;
      background: transparent;
      border: 1px solid var(--accent-border);
      border-radius: 10px;
      color: var(--accent);
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-close:hover {
      background: var(--accent-dim);
      box-shadow: 0 0 16px var(--accent-glow);
    }
  </style>
</head>
<body>

<!-- 당첨 오버레이 -->
<div class="winner-overlay" id="winnerOverlay">
  <div class="winner-ring"></div>
  <div class="winner-emoji">🎉</div>
  <div class="winner-label">당 첨</div>
  <div class="winner-name" id="winnerName"></div>
  <button class="btn-close" onclick="closeWinner()">확인</button>
</div>

<!-- 헤더 -->
<header>
  <div class="brand">🎰 치지직 룰렛</div>
  <div class="channel-badge">
    <span>📺</span>
    <span id="channelBadge">로딩 중...</span>
  </div>
  <button class="back-btn" onclick="location.href='/'">← 채널 변경</button>
</header>

<main>

  <!-- 왼쪽: 설정 -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">스트리머 설정</span>
    </div>
    <div class="panel-body">

      <div class="sg">
        <div class="sg-title">후원 설정</div>
        <div class="row">
          <div>
            <div class="row-label">자동 추가</div>
            <div class="row-sub">후원 시 룰렛 칸 자동 추가</div>
          </div>
          <button class="toggle on" id="autoToggle" onclick="toggleAuto()"></button>
        </div>
        <div class="row">
          <div>
            <div class="row-label">칸당 치즈</div>
            <div class="row-sub">이 금액당 1칸 추가</div>
          </div>
          <input class="num-input" id="cheesePerSlot" type="number" value="100" min="1"/>
        </div>
        <div class="row">
          <div>
            <div class="row-label">최대 칸 수</div>
            <div class="row-sub">시청자당 최대 칸</div>
          </div>
          <input class="num-input" id="maxSlots" type="number" value="10" min="1"/>
        </div>
      </div>

      <div class="sg">
        <div class="sg-title">룰렛 항목</div>
        <div id="slotList"></div>
        <div class="add-row">
          <input class="add-input" id="newSlotInput" placeholder="항목 이름 입력"/>
          <button class="btn-add" onclick="addSlot()">+ 추가</button>
        </div>
      </div>

      <div style="display:flex; gap:6px;">
        <button class="btn-outline" style="flex:1" onclick="resetEntries()">참가자 초기화</button>
        <button class="btn-outline" style="flex:1" onclick="resetAll()">전체 초기화</button>
      </div>

    </div>
  </div>

  <!-- 중앙: 룰렛 -->
  <div class="panel" style="border-right:1px solid var(--border)">
    <div class="panel-header">
      <span class="panel-title">룰렛</span>
      <span id="totalCount" style="font-size:0.66rem; color:var(--muted2)">0칸</span>
    </div>
    <div class="roulette-center">
      <div class="roulette-wrap">
        <div class="roulette-ring"></div>
        <div class="roulette-pointer"></div>
        <canvas id="rouletteCanvas"></canvas>
        <button class="spin-btn" id="spinBtn" onclick="spin()">SPIN</button>
      </div>
      <div class="result-box" id="resultBox"></div>
      <div class="ctrl-row">
        <button class="btn-ctrl" onclick="resetEntries()">참가자 초기화</button>
        <button class="btn-ctrl primary" id="spinBtn2" onclick="spin()">룰렛 돌리기</button>
      </div>
    </div>
  </div>

  <!-- 오른쪽: 채팅 -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">실시간 채팅</span>
      <div class="conn-status">
        <div class="conn-dot" id="connDot"></div>
        <span id="connText">대기 중</span>
      </div>
    </div>
    <div class="chat-list" id="chatList">
      <div class="empty-panel">
        <div>💬</div>
        <p>채팅 연결 중...</p>
      </div>
    </div>
  </div>

</main>

<script>
// ════════════════════════════════════
// 설정 (배포 후 실제 URL로 교체)
// ════════════════════════════════════
const WS_URL = 'wss://chzzk-ws-relay.YOUR_ACCOUNT.workers.dev';

// ════════════════════════════════════
// 상태
// ════════════════════════════════════
const params    = new URLSearchParams(location.search);
const CHANNEL_ID   = params.get('channelId') || '';
const CHANNEL_NAME = decodeURIComponent(params.get('channelName') || '');

document.getElementById('channelBadge').textContent = CHANNEL_NAME || CHANNEL_ID;

let ws        = null;
let spinning  = false;
let chatReady = false;
let autoAdd   = true;
let slots     = [];      // { name, color, entries }
let angle     = 0;

const COLORS = [
  '#FF6B6B','#FF9F43','#FECA57','#48DBFB',
  '#FF9FF3','#54A0FF','#5F27CD','#00D2D3',
  '#01CBC6','#C8D6E5','#EE5A24','#009432',
];

// ════════════════════════════════════
// 초기화
// ════════════════════════════════════
window.onload = () => {
  if (!CHANNEL_ID) { location.href = '/'; return; }
  renderSlots();
  drawWheel();
  connectWS();
};

// ════════════════════════════════════
// 슬롯 관리
// ════════════════════════════════════
function addSlot(name, count = 1) {
  const el = document.getElementById('newSlotInput');
  const n  = name || el?.value?.trim();
  if (!n) return;

  const max = parseInt(document.getElementById('maxSlots').value) || 10;
  const ex  = slots.find(s => s.name === n);
  if (ex) {
    ex.entries = Math.min(ex.entries + count, max);
  } else {
    slots.push({ name: n, color: COLORS[slots.length % COLORS.length], entries: count });
  }

  if (el) el.value = '';
  renderSlots();
  drawWheel();
}

function removeSlot(i) {
  slots.splice(i, 1);
  renderSlots();
  drawWheel();
}

function renderSlots() {
  const total = slots.reduce((a, s) => a + s.entries, 0);
  document.getElementById('totalCount').textContent = `${total}칸`;

  const list = document.getElementById('slotList');
  if (!slots.length) {
    list.innerHTML = `<div style="font-size:0.72rem;color:var(--muted2);text-align:center;padding:8px 0">항목을 추가해 주세요</div>`;
    return;
  }
  list.innerHTML = slots.map((s, i) => `
    <div class="slot-item">
      <div class="slot-color" style="background:${s.color}"></div>
      <input class="slot-name-input" value="${esc(s.name)}"
        onchange="slots[${i}].name=this.value;drawWheel()"/>
      <span class="slot-count">${s.entries}칸</span>
      <button class="slot-del" onclick="removeSlot(${i})">✕</button>
    </div>
  `).join('');
}

function resetEntries() {
  if (!confirm('참가자 칸을 초기화할까요?')) return;
  slots.forEach(s => s.entries = 1);
  renderSlots(); drawWheel();
}

function resetAll() {
  if (!confirm('모든 항목을 초기화할까요?')) return;
  slots = []; renderSlots(); drawWheel();
  document.getElementById('resultBox').innerHTML = '';
}

function toggleAuto() {
  autoAdd = !autoAdd;
  document.getElementById('autoToggle').classList.toggle('on', autoAdd);
}

// ════════════════════════════════════
// 룰렛 그리기
// ════════════════════════════════════
const canvas = document.getElementById('rouletteCanvas');
const ctx    = canvas.getContext('2d');

function drawWheel(a = angle) {
  const size = canvas.parentElement.offsetWidth;
  canvas.width  = size;
  canvas.height = size;
  const cx = size / 2, cy = size / 2, r = size / 2 - 2;

  ctx.clearRect(0, 0, size, size);

  const total = slots.reduce((s, x) => s + x.entries, 0);

  if (!total) {
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fillStyle = '#111';
    ctx.fill();
    ctx.fillStyle = '#333';
    ctx.font = `${size * 0.055}px Pretendard`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('항목을 추가하세요', cx, cy);
    return;
  }

  // 각 슬롯 펼치기
  const exp = [];
  slots.forEach(s => { for (let i = 0; i < s.entries; i++) exp.push(s); });

  const slice = (Math.PI * 2) / exp.length;
  let sa = a;

  exp.forEach(s => {
    const ea = sa + slice;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, sa, ea);
    ctx.closePath();
    ctx.fillStyle = s.color;
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.4)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // 텍스트
    const ta = sa + slice / 2;
    const tx = cx + Math.cos(ta) * r * 0.64;
    const ty = cy + Math.sin(ta) * r * 0.64;
    ctx.save();
    ctx.translate(tx, ty);
    ctx.rotate(ta + Math.PI / 2);
    ctx.fillStyle = 'rgba(0,0,0,0.75)';
    ctx.font = `bold ${Math.max(size * 0.027, 9)}px Pretendard`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const label = s.name.length > 7 ? s.name.slice(0, 7) + '…' : s.name;
    ctx.fillText(label, 0, 0);
    ctx.restore();

    sa = ea;
  });

  // 중앙 원
  ctx.beginPath();
  ctx.arc(cx, cy, size * 0.087, 0, Math.PI * 2);
  ctx.fillStyle = '#000';
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,255,163,0.4)';
  ctx.lineWidth = 2;
  ctx.stroke();
}

// ════════════════════════════════════
// 돌리기
// ════════════════════════════════════
function spin() {
  const total = slots.reduce((a, s) => a + s.entries, 0);
  if (!total) return alert('룰렛 항목을 먼저 추가해주세요');
  if (spinning) return;

  spinning = true;
  ['spinBtn','spinBtn2'].forEach(id => document.getElementById(id).disabled = true);
  document.getElementById('resultBox').innerHTML = '';

  const extraRot  = (5 + Math.random() * 5) * Math.PI * 2;
  const randAngle = Math.random() * Math.PI * 2;
  const total_rot = extraRot + randAngle;
  const duration  = 4500 + Math.random() * 2000;
  const startAngle = angle;
  const startTime  = performance.now();

  const ease = t => 1 - Math.pow(1 - t, 4);

  (function frame(now) {
    const t = Math.min((now - startTime) / duration, 1);
    angle = startAngle + total_rot * ease(t);
    drawWheel(angle);
    if (t < 1) {
      requestAnimationFrame(frame);
    } else {
      spinning = false;
      ['spinBtn','spinBtn2'].forEach(id => document.getElementById(id).disabled = false);
      showResult();
    }
  })(performance.now());
}

function showResult() {
  const exp = [];
  slots.forEach(s => { for (let i = 0; i < s.entries; i++) exp.push(s); });
  if (!exp.length) return;

  const slice = (Math.PI * 2) / exp.length;
  const ptr   = -Math.PI / 2;
  const norm  = ((ptr - angle) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2);
  const winner = exp[Math.floor(norm / slice) % exp.length];

  document.getElementById('resultBox').innerHTML = `
    <div class="result-label">당 첨</div>
    <div class="result-name">${esc(winner.name)}</div>
  `;
  document.getElementById('winnerName').textContent = winner.name;
  document.getElementById('winnerOverlay').classList.add('show');
}

function closeWinner() {
  document.getElementById('winnerOverlay').classList.remove('show');
}

// ════════════════════════════════════
// WebSocket
// ════════════════════════════════════
function connectWS() {
  setConn('', '연결 중...');
  ws = new WebSocket(`${WS_URL}?channelId=${CHANNEL_ID}`);

  ws.onopen  = () => setConn('on', '연결됨');
  ws.onclose = () => setConn('', '연결 끊김');
  ws.onerror = () => setConn('err', '오류');

  ws.onmessage = e => {
    try {
      const d = JSON.parse(e.data);
      if      (d.type === 'chat')         addChatMsg(d);
      else if (d.type === 'donation')     handleDonation(d);
      else if (d.type === 'subscription') handleSub(d);
      else if (d.type === 'connected')    sysMsg('✅ 채팅 연결됨');
      else if (d.type === 'disconnected') sysMsg('채팅 끊김');
      else if (d.type === 'error')        { sysMsg('⚠️ ' + d.message); setConn('err', '오류'); }
    } catch(_) {}
  };
}

function handleDonation(d) {
  const cheese = parseInt(document.getElementById('cheesePerSlot').value) || 100;
  const add = Math.max(1, Math.floor((d.amount || 0) / cheese));
  addDonationMsg(d, add);
  if (autoAdd && d.user) addSlot(d.user, add);
}

function handleSub(d) {
  sysMsg(`🌟 ${d.user}님이 구독했습니다!`);
  if (autoAdd && d.user) addSlot(d.user, 1);
}

function addChatMsg(d) {
  const list = ensureChat();
  const el = document.createElement('div');
  el.className = 'chat-item';
  el.innerHTML = `<span class="chat-user">${esc(d.user)}</span><span class="chat-msg">${esc(d.message)}</span>`;
  list.appendChild(el);
  trimChat(list);
}

function addDonationMsg(d, add) {
  const list = ensureChat();
  const el = document.createElement('div');
  el.className = 'chat-item donation-chat';
  el.innerHTML = `
    <span class="chat-user">🎁 ${esc(d.user)}</span>
    <span class="donation-slots">${(d.amount||0).toLocaleString()}치즈 → +${add}칸 추가</span>
    ${d.message ? `<div class="donation-msg-text">${esc(d.message)}</div>` : ''}
  `;
  list.appendChild(el);
  trimChat(list);
}

function sysMsg(text) {
  const list = ensureChat();
  const el = document.createElement('div');
  el.className = 'system-chat';
  el.textContent = text;
  list.appendChild(el);
  trimChat(list);
}

function ensureChat() {
  const list = document.getElementById('chatList');
  if (!chatReady) { list.innerHTML = ''; chatReady = true; }
  return list;
}

function trimChat(list) {
  while (list.children.length > 250) list.removeChild(list.firstChild);
  list.scrollTop = list.scrollHeight;
}

function setConn(cls, text) {
  const dot = document.getElementById('connDot');
  dot.className = 'conn-dot' + (cls ? ' ' + cls : '');
  document.getElementById('connText').textContent = text;
}

// ════════════════════════════════════
// 유틸
// ════════════════════════════════════
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.getElementById('newSlotInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addSlot();
});

window.addEventListener('resize', () => drawWheel());
renderSlots();
</script>
</body>
</html>
