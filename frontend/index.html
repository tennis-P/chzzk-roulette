<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>치지직 대시보드</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #080a0f;
      --surf1:    #10131a;
      --surf2:    #181c26;
      --surf3:    #1f2433;
      --border:   rgba(255,255,255,0.07);
      --border2:  rgba(255,255,255,0.12);
      --accent:   #3df0c2;
      --accent2:  #ff5c6a;
      --gold:     #f5c842;
      --sub:      #7b82f5;
      --text:     #dde2ef;
      --muted:    #5a6180;
      --live-red: #ff3b3b;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    header {
      height: 56px;
      min-height: 56px;
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 16px;
      background: var(--surf1);
      border-bottom: 1px solid var(--border);
    }

    .brand {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--accent);
      white-space: nowrap;
    }
    .brand em { color: var(--muted); font-style: normal; }

    .search-wrap {
      flex: 1;
      display: flex;
      gap: 8px;
      max-width: 560px;
      margin-left: auto;
    }
    .search-wrap input {
      flex: 1;
      height: 36px;
      padding: 0 14px;
      background: var(--surf2);
      border: 1px solid var(--border2);
      border-radius: 8px;
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.8rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-wrap input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(61,240,194,0.1);
    }
    .search-wrap input::placeholder { color: var(--muted); }

    .btn {
      height: 36px;
      padding: 0 18px;
      border: none;
      border-radius: 8px;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .btn-primary { background: var(--accent); color: #050810; }
    .btn-primary:hover { filter: brightness(1.1); }
    .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }

    main {
      flex: 1;
      display: grid;
      grid-template-columns: 280px 1fr 300px;
      overflow: hidden;
    }

    .col {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-right: 1px solid var(--border);
    }
    .col:last-child { border-right: none; }

    .col-header {
      height: 40px;
      min-height: 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surf1);
    }
    .col-title {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .col-body {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .col-body::-webkit-scrollbar { width: 3px; }
    .col-body::-webkit-scrollbar-thumb { background: var(--surf3); border-radius: 2px; }

    .channel-card {
      background: var(--surf2);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .channel-img {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      background: var(--surf3);
      display: block;
    }
    .channel-img-placeholder {
      width: 100%;
      aspect-ratio: 16/9;
      background: var(--surf3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      color: var(--muted);
    }
    .channel-body { padding: 12px 14px; }
    .channel-name { font-size: 0.95rem; font-weight: 700; margin-bottom: 4px; }
    .channel-desc {
      font-size: 0.76rem;
      color: var(--muted);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .stat-box {
      background: var(--surf2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 12px;
    }
    .stat-label {
      font-size: 0.66rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 5px;
    }
    .stat-val {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--accent);
    }

    .badge-live {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--live-red);
      color: #fff;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      padding: 3px 10px;
      border-radius: 20px;
    }
    .badge-live::before {
      content: '';
      width: 6px; height: 6px;
      background: #fff;
      border-radius: 50%;
      animation: blink 1.1s ease-in-out infinite;
    }
    @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0.2; } }

    .badge-offline {
      display: inline-flex;
      align-items: center;
      background: var(--surf3);
      color: var(--muted);
      font-size: 0.68rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid var(--border2);
    }

    .live-card {
      background: var(--surf2);
      border: 1px solid var(--border);
      border-left: 3px solid var(--live-red);
      border-radius: 10px;
      padding: 12px 14px;
    }
    .live-title-text { font-size: 0.88rem; font-weight: 700; margin-bottom: 6px; line-height: 1.4; }
    .live-meta { display: flex; gap: 12px; font-size: 0.75rem; color: var(--muted); }
    .live-meta span { color: var(--accent); }

    .chat-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .chat-list::-webkit-scrollbar { width: 3px; }
    .chat-list::-webkit-scrollbar-thumb { background: var(--surf3); }

    .chat-item {
      font-size: 0.82rem;
      line-height: 1.55;
      word-break: break-word;
      padding: 1px 0;
      animation: fadeUp 0.2s ease;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(4px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .chat-user { font-weight: 700; margin-right: 5px; color: var(--accent); }
    .chat-user.manager { color: var(--gold); }
    .chat-user.streamer { color: var(--live-red); }
    .chat-msg { color: var(--text); }
    .system-msg {
      font-size: 0.72rem;
      color: var(--muted);
      text-align: center;
      padding: 4px 0;
      font-style: italic;
    }

    .donation-item {
      background: var(--surf2);
      border: 1px solid var(--border);
      border-left: 3px solid var(--gold);
      border-radius: 9px;
      padding: 10px 12px;
      animation: slideDown 0.3s ease;
    }
    .sub-item { border-left-color: var(--sub); }
    @keyframes slideDown {
      from { opacity:0; transform:translateY(-6px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .donation-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .donation-user { font-size: 0.82rem; font-weight: 700; }
    .donation-amount { font-family: 'IBM Plex Mono', monospace; font-size: 0.82rem; font-weight: 600; color: var(--gold); }
    .donation-msg { font-size: 0.78rem; color: var(--muted); line-height: 1.4; }
    .donation-time { font-size: 0.68rem; color: var(--muted); margin-top: 4px; }

    .conn-indicator { display: flex; align-items: center; gap: 6px; font-size: 0.7rem; color: var(--muted); }
    .conn-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); }
    .conn-dot.on { background: var(--accent); animation: blink 2s ease-in-out infinite; }
    .conn-dot.err { background: var(--accent2); }

    .empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--muted);
      font-size: 0.82rem;
      text-align: center;
      padding: 20px;
    }
    .empty-icon { font-size: 2.5rem; opacity: 0.5; }

    .spinner {
      width: 24px; height: 24px;
      border: 2px solid var(--surf3);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <div class="brand">CHZZK<em>.dashboard</em></div>
  <div class="search-wrap">
    <input id="channelInput" type="text" placeholder="채널 ID 입력 (예: abc123def456...)"/>
    <button class="btn btn-primary" id="searchBtn" onclick="search()">조회</button>
  </div>
</header>

<main>
  <!-- 채널 정보 -->
  <div class="col">
    <div class="col-header">
      <span class="col-title">채널 정보</span>
      <div id="liveStatusBadge"></div>
    </div>
    <div class="col-body" id="channelBody">
      <div class="empty">
        <div class="empty-icon">📺</div>
        <p>채널 ID를 입력하고<br/>조회 버튼을 눌러주세요</p>
      </div>
    </div>
  </div>

  <!-- 실시간 채팅 -->
  <div class="col" style="border-right: 1px solid var(--border);">
    <div class="col-header">
      <span class="col-title">실시간 채팅</span>
      <div class="conn-indicator">
        <div class="conn-dot" id="chatDot"></div>
        <span id="chatStatusText">대기 중</span>
      </div>
    </div>
    <div class="chat-list" id="chatList">
      <div class="empty">
        <div class="empty-icon">💬</div>
        <p>채널에 연결되면<br/>채팅이 여기 표시됩니다</p>
      </div>
    </div>
  </div>

  <!-- 후원 · 구독 -->
  <div class="col">
    <div class="col-header">
      <span class="col-title">후원 · 구독</span>
      <span id="donationCount" style="font-size:0.7rem; color:var(--muted);">0건</span>
    </div>
    <div class="col-body" id="donationBody">
      <div class="empty">
        <div class="empty-icon">🎁</div>
        <p>후원 내역이 없습니다</p>
      </div>
    </div>
  </div>
</main>

<script>
  // ⚙️ 배포 후 실제 URL로 교체
  const CONFIG = {
    WS_URL: 'wss://chzzk-ws-relay.YOUR_ACCOUNT.workers.dev',
  };

  let ws = null;
  let chatInitialized = false;
  let donationCount = 0;

  async function search() {
    const channelId = document.getElementById('channelInput').value.trim();
    if (!channelId) return alert('채널 ID를 입력해주세요');

    const btn = document.getElementById('searchBtn');
    btn.disabled = true;
    btn.textContent = '조회 중...';

    if (ws) { ws.close(); ws = null; }
    chatInitialized = false;
    donationCount = 0;
    updateDonationCount();
    setChannelLoading();

    try {
      const [channelData, liveData] = await Promise.all([
        fetch(`/api/channel/${channelId}`).then(r => r.json()),
        fetch(`/api/live/${channelId}`).then(r => r.json()),
      ]);
      renderChannel(channelData, liveData);
      connectWebSocket(channelId);
    } catch (e) {
      setChannelError(e.message);
    }

    btn.disabled = false;
    btn.textContent = '조회';
  }

  function renderChannel(channelData, liveData) {
    const ch = channelData?.content || {};
    const live = liveData?.content || {};
    const isLive = live?.status === 'OPEN';

    document.getElementById('liveStatusBadge').innerHTML = isLive
      ? `<div class="badge-live">LIVE</div>`
      : `<div class="badge-offline">● 오프라인</div>`;

    const body = document.getElementById('channelBody');
    body.innerHTML = '';

    const card = document.createElement('div');
    card.className = 'channel-card';
    card.innerHTML = ch.channelImageUrl
      ? `<img class="channel-img" src="${ch.channelImageUrl}" alt="채널 이미지"/>`
      : `<div class="channel-img-placeholder">🎮</div>`;
    card.innerHTML += `
      <div class="channel-body">
        <div class="channel-name">${esc(ch.channelName || '알 수 없는 채널')}</div>
        ${ch.channelDescription ? `<div class="channel-desc">${esc(ch.channelDescription)}</div>` : ''}
      </div>
    `;
    body.appendChild(card);

    const statGrid = document.createElement('div');
    statGrid.className = 'stat-grid';
    statGrid.innerHTML = `
      <div class="stat-box">
        <div class="stat-label">팔로워</div>
        <div class="stat-val">${fmt(ch.followerCount)}</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">시청자</div>
        <div class="stat-val">${isLive ? fmt(live.concurrentUserCount) : '—'}</div>
      </div>
    `;
    body.appendChild(statGrid);

    if (isLive && live.liveTitle) {
      const liveCard = document.createElement('div');
      liveCard.className = 'live-card';
      liveCard.innerHTML = `
        <div class="live-title-text">${esc(live.liveTitle)}</div>
        <div class="live-meta">
          ${live.liveCategory ? `<span>${esc(live.liveCategory)}</span>` : ''}
          <span style="color:var(--muted)">누적 <span>${fmt(live.accumulateCount)}</span>명</span>
        </div>
      `;
      body.appendChild(liveCard);
    }
  }

  function setChannelLoading() {
    document.getElementById('channelBody').innerHTML = `<div class="empty"><div class="spinner"></div></div>`;
    document.getElementById('liveStatusBadge').innerHTML = '';
  }

  function setChannelError(msg) {
    document.getElementById('channelBody').innerHTML = `
      <div class="empty">
        <div class="empty-icon">⚠️</div>
        <p>불러오기 실패<br/><small>${esc(msg)}</small></p>
      </div>
    `;
  }

  function connectWebSocket(channelId) {
    setConnStatus('', '연결 중...');
    ws = new WebSocket(`${CONFIG.WS_URL}?channelId=${channelId}`);
    ws.onopen = () => setConnStatus('on', '연결됨');
    ws.onmessage = (e) => {
      try {
        const data = JSON.parse(e.data);
        if (data.type === 'chat') addChat(data);
        else if (data.type === 'donation') addDonation(data, false);
        else if (data.type === 'subscription') addDonation(data, true);
        else if (data.type === 'connected' || data.type === 'disconnected') addSystemMsg(data.message);
        else if (data.type === 'error') { addSystemMsg('⚠️ ' + data.message); setConnStatus('err', '오류'); }
      } catch (_) {}
    };
    ws.onclose = () => setConnStatus('', '연결 끊김');
    ws.onerror = () => setConnStatus('err', '오류 발생');
  }

  function addChat(data) {
    const list = document.getElementById('chatList');
    if (!chatInitialized) { list.innerHTML = ''; chatInitialized = true; }
    const roleClass = data.color === 'streaming_chat_manager' ? 'manager' : data.color === 'broadcaster' ? 'streamer' : '';
    const item = document.createElement('div');
    item.className = 'chat-item';
    item.innerHTML = `<span class="chat-user ${roleClass}">${esc(data.user)}</span><span class="chat-msg">${esc(data.message)}</span>`;
    list.appendChild(item);
    while (list.children.length > 300) list.removeChild(list.firstChild);
    list.scrollTop = list.scrollHeight;
  }

  function addSystemMsg(text) {
    const list = document.getElementById('chatList');
    if (!chatInitialized) { list.innerHTML = ''; chatInitialized = true; }
    const item = document.createElement('div');
    item.className = 'system-msg';
    item.textContent = text;
    list.appendChild(item);
    list.scrollTop = list.scrollHeight;
  }

  function addDonation(data, isSub) {
    const body = document.getElementById('donationBody');
    if (body.querySelector('.empty')) body.innerHTML = '';
    const item = document.createElement('div');
    item.className = `donation-item ${isSub ? 'sub-item' : ''}`;
    item.innerHTML = `
      <div class="donation-top">
        <span class="donation-user">${isSub ? '🌟' : '🎁'} ${esc(data.user)}</span>
        ${isSub
          ? `<span class="donation-amount" style="color:var(--sub)">${data.month}개월 구독</span>`
          : `<span class="donation-amount">${(data.amount||0).toLocaleString()} 치즈</span>`}
      </div>
      ${data.message ? `<div class="donation-msg">${esc(data.message)}</div>` : ''}
      <div class="donation-time">${fmtTime(data.time)}</div>
    `;
    body.prepend(item);
    donationCount++;
    updateDonationCount();
    while (body.children.length > 80) body.removeChild(body.lastChild);
  }

  function setConnStatus(cls, text) {
    const dot = document.getElementById('chatDot');
    dot.className = 'conn-dot' + (cls ? ' ' + cls : '');
    document.getElementById('chatStatusText').textContent = text;
  }
  function updateDonationCount() {
    document.getElementById('donationCount').textContent = `${donationCount}건`;
  }
  function esc(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function fmt(n) { return n != null ? Number(n).toLocaleString() : '—'; }
  function fmtTime(iso) { try { return new Date(iso).toLocaleTimeString('ko-KR'); } catch { return ''; } }

  document.getElementById('channelInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') search();
  });
</script>
</body>
</html>
