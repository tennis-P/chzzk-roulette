<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>치지직 룰렛</title>
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap" rel="stylesheet"/>
  <style>
    @font-face {
      font-family: 'Pretendard';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Thin.woff2') format('woff2');
      font-weight: 100; font-display: swap;
    }
    @font-face {
      font-family: 'Pretendard';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-ExtraLight.woff2') format('woff2');
      font-weight: 200; font-display: swap;
    }
    @font-face {
      font-family: 'Pretendard';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Light.woff2') format('woff2');
      font-weight: 300; font-display: swap;
    }
    @font-face {
      font-family: 'Pretendard';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Regular.woff2') format('woff2');
      font-weight: 400; font-display: swap;
    }
    @font-face {
      font-family: 'Pretendard';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Medium.woff2') format('woff2');
      font-weight: 500; font-display: swap;
    }
    @font-face {
      font-family: 'Pretendard';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-SemiBold.woff2') format('woff2');
      font-weight: 600; font-display: swap;
    }
    @font-face {
      font-family: 'Pretendard';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Bold.woff2') format('woff2');
      font-weight: 700; font-display: swap;
    }
    @font-face {
      font-family: 'Pretendard';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-ExtraBold.woff2') format('woff2');
      font-weight: 800; font-display: swap;
    }
    @font-face {
      font-family: 'Pretendard';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/pretendard@1.0/Pretendard-Black.woff2') format('woff2');
      font-weight: 900; font-display: swap;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #000000;
      --accent: #00FFA3;
      --accent-dim: rgba(0,255,163,0.12);
      --accent-glow: rgba(0,255,163,0.25);
      --text: #f0f0f0;
      --muted: #555;
      --surf: rgba(255,255,255,0.03);
      --border: rgba(255,255,255,0.07);
      --border-accent: rgba(0,255,163,0.3);
    }

    body {
      font-family: 'Pretendard', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* 배경 효과 */
    .bg-glow {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.12;
      pointer-events: none;
    }
    .bg-glow.g1 {
      width: 600px; height: 600px;
      background: var(--accent);
      top: -200px; left: -200px;
      animation: drift 10s ease-in-out infinite alternate;
    }
    .bg-glow.g2 {
      width: 400px; height: 400px;
      background: var(--accent);
      bottom: -150px; right: -100px;
      animation: drift 14s ease-in-out infinite alternate-reverse;
    }
    @keyframes drift {
      from { transform: translate(0, 0); }
      to   { transform: translate(50px, 40px); }
    }

    /* 그리드 배경 */
    .grid-bg {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,163,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,163,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    /* 룰렛 장식 */
    .deco-ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(0,255,163,0.05);
      top: 50%; left: 50%;
      animation: spin-slow 40s linear infinite;
    }
    .deco-ring.r1 { width: 700px; height: 700px; transform: translate(-50%,-50%); }
    .deco-ring.r2 { width: 500px; height: 500px; transform: translate(-50%,-50%); border-color: rgba(0,255,163,0.03); }
    @keyframes spin-slow { to { transform: translate(-50%,-50%) rotate(360deg); } }

    /* 컨테이너 */
    .container {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 36px;
      width: 100%;
      max-width: 460px;
      padding: 0 24px;
    }

    /* 타이틀 */
    .title-wrap {
      text-align: center;
      animation: fadeUp 0.7s ease both;
    }
    .title-eyebrow {
      font-size: 0.7rem;
      letter-spacing: 5px;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    .title {
      font-family: 'Black Han Sans', sans-serif;
      font-size: clamp(3.5rem, 12vw, 5.5rem);
      line-height: 0.95;
      letter-spacing: -3px;
      color: #fff;
    }
    .title .highlight {
      color: var(--accent);
      display: block;
    }
    .title-desc {
      margin-top: 14px;
      font-size: 0.82rem;
      color: var(--muted);
      letter-spacing: 0.5px;
    }

    /* 카드 */
    .card {
      width: 100%;
      background: var(--surf);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px;
      animation: fadeUp 0.7s 0.15s ease both;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.4;
    }

    .input-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
      display: block;
    }

    .input-field {
      width: 100%;
      height: 50px;
      padding: 0 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Pretendard', sans-serif;
    }
    .input-field:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .input-field::placeholder { color: #333; }

    .input-hint {
      font-size: 0.72rem;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 22px;
    }
    .input-hint code {
      color: var(--accent);
      background: var(--accent-dim);
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 0.7rem;
    }

    .btn-enter {
      width: 100%;
      height: 50px;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      color: #000;
      font-family: 'Black Han Sans', sans-serif;
    }
    .btn-enter:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px var(--accent-glow);
    }
    .btn-enter:active { transform: translateY(0); }
    .btn-enter:disabled { opacity: 0.3; cursor: not-allowed; transform: none; box-shadow: none; }

    .error-msg {
      display: none;
      margin-top: 12px;
      font-size: 0.78rem;
      color: #ff5c5c;
      text-align: center;
    }
    .error-msg.show { display: block; }

    .loading-row {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 12px;
      font-size: 0.78rem;
      color: var(--accent);
    }
    .loading-row.show { display: flex; }
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid var(--accent-dim);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .footer {
      font-size: 0.68rem;
      color: #222;
      text-align: center;
      animation: fadeUp 0.7s 0.3s ease both;
    }
  </style>
</head>
<body>

<div class="bg-glow g1"></div>
<div class="bg-glow g2"></div>
<div class="grid-bg"></div>
<div class="deco-ring r1"></div>
<div class="deco-ring r2"></div>

<div class="container">

  <div class="title-wrap">
    <div class="title-eyebrow">🎰 Chzzk Live Roulette</div>
    <div class="title">
      치지직
      <span class="highlight">룰렛</span>
    </div>
    <div class="title-desc">시청자 참여형 실시간 후원 룰렛</div>
  </div>

  <div class="card">
    <label class="input-label">Channel ID</label>
    <input
      class="input-field"
      id="channelInput"
      type="text"
      placeholder="채널 ID를 입력하세요"
      autocomplete="off"
    />
    <div class="input-hint">
      치지직 채널 URL에서 확인할 수 있어요<br/>
      예) chzzk.naver.com/live/<code>abc123def456...</code>
    </div>
    <button class="btn-enter" id="enterBtn" onclick="enter()">입 장</button>
    <div class="error-msg" id="errorMsg"></div>
    <div class="loading-row" id="loadingRow">
      <div class="spinner"></div>
      채널 확인 중...
    </div>
  </div>

  <div class="footer">후원으로 룰렛 칸을 추가하고 당첨을 노려보세요</div>

</div>

<script>
  async function enter() {
    const channelId = document.getElementById('channelInput').value.trim();
    if (!channelId) return showError('채널 ID를 입력해주세요');

    const btn = document.getElementById('enterBtn');
    btn.disabled = true;
    document.getElementById('errorMsg').classList.remove('show');
    document.getElementById('loadingRow').classList.add('show');

    try {
      const res = await fetch(`/api/channel/${channelId}`);
      const data = await res.json();

      if (!data?.content?.channelId) throw new Error('존재하지 않는 채널이에요');

      const name = encodeURIComponent(data.content.channelName || '');
      window.location.href = `/roulette.html?channelId=${channelId}&channelName=${name}`;
    } catch (e) {
      showError(e.message || '채널을 찾을 수 없어요');
      btn.disabled = false;
      document.getElementById('loadingRow').classList.remove('show');
    }
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = '⚠️ ' + msg;
    el.classList.add('show');
  }

  document.getElementById('channelInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') enter();
  });
</script>
</body>
</html>
